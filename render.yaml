services:
  - type: worker
    name: luxury-scraper
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py --schedule --interval 15
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: SCRAPE_INTERVAL_MINUTES
        value: "15"
